<!-- Модалки -->

<div class="modals">
	<!-- Заказать звонок -->
	<div class="modal modal-call" id="modal-call">
		<div class="modal__dialog">
			<div class="modal__content-wrapper">
				<div class="modal__content">
					<div class="form modal__form">
						<div class="title-2 title_not-decor modal__title">Обратный звонок</div>
						<form>
							<input type="hidden" name="form_hidden_22" value="">
							<input type="hidden" name="info" class="modal-info">
							<div class="form__fields">
								<input class="input" type="text" name="name" placeholder="Ваше имя*" required>
								<input class="input" type="tel" name="phone" placeholder="Номер телефона*" required>
								<div class="form__row">
									<label class="checkbox">
										<input class="checkbox__input" type="checkbox" checked required>
										<span class="checkbox__text">
											Я соглашаюсь с
											<a href="text.html" class="active-text hover-underline" target="_blank">пользовательским соглашением</a>
											и
											<a href="text.html" class="active-text hover-underline" target="_blank">политикой конфиденциальности</a>
										</span>
									</label>
									<button class="button submit">Отправить</button>
								</div>
							</div>
						</form>
					</div>
				</div>
				<button class="modal__close" type="button" data-modal-close>
					<svg class="close">
						<use xlink:href="assets/img/sprite.svg#close"></use>
					</svg>
				</button>
			</div>
		</div>
	</div>

	<!-- Забронировать -->
	<div class="modal modal-book" id="modal-book">
		<div class="modal__dialog">
			<div class="modal__content-wrapper">
				<div class="modal__content">
					<div class="form modal__form">
						<div class="title-2 title_not-decor modal__title">Забронировать</div>
						<form>
							<input type="hidden" name="form_hidden_22" value="">
							<input type="hidden" name="info" class="modal-info">
							<div class="form__fields">
								<input class="input" type="text" name="name" placeholder="Ваше имя*" required>
								<textarea class="textarea" name="message" cols="30" rows="5" placeholder="Сообщение"></textarea>
								<input class="input" type="tel" name="phone" placeholder="Номер телефона*" required>
								<div class="input-date">
									<input type="date" name="date" class="input" placeholder="01.02.2023" max="9999-12-31" required>
									<span>Желаемая дата</span>
								</div>
								<div class="form__row">
									<label class="checkbox">
										<input class="checkbox__input" type="checkbox" checked required>
										<span class="checkbox__text">
											Я соглашаюсь с
											<a href="text.html" class="active-text hover-underline" target="_blank">пользовательским соглашением</a>
											и
											<a href="text.html" class="active-text hover-underline" target="_blank">политикой конфиденциальности</a>
										</span>
									</label>
									<button class="button submit">Отправить</button>
								</div>
							</div>
						</form>
					</div>
				</div>
				<button class="modal__close" type="button" data-modal-close>
					<svg class="close">
						<use xlink:href="assets/img/sprite.svg#close"></use>
					</svg>
				</button>
			</div>
		</div>
	</div>

	<!-- Окно благодарности -->
	<div class="modal modal-thank" id="modal-thank">
		<div class="modal__dialog">
			<div class="modal__content">
				<div class="title-2 modal__title">Спасибо за заявку!</div>
				<img src="assets/img/icons/check.svg" width="80" height="80" alt="" loading="lazy" decoding="async">
			</div>
		</div>
	</div>

	<!-- Куки -->
	<div class="cookies">
		<div class="container">
			<div class="cookies-wrapper">
				<div class="cookies__title">
					<svg class="cookies-icon" aria-hidden="true">
						<use xlink:href="assets/img/sprite.svg#cookies"></use>
					</svg>
					<span>Cookies файлы</span>
				</div>
				<button class="button button_border cookies__button" type="button">Принять</button>
				<div class="cookies__text">
					Настраиваем звучание: мы используем cookies, чтобы сайт работал без фальшивых нот. Согласны?
				</div>
			</div>
		</div>
	</div>
</div>
